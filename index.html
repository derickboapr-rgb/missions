<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Missions">
<title>Missions</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: #F7F7F8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: #1A1A1E;
  }
  #app {
    min-height: 100dvh;
    width: 100%;
    padding: calc(16px + env(safe-area-inset-top)) 14px calc(32px + env(safe-area-inset-bottom));
  }
  button { font-family: inherit; }
  .header { margin-bottom: 18px; }
  .back-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    color: #2563EB; font-size: 15px; font-weight: 500;
    padding: 6px 4px 6px 0;
  }
  .root-label { font-size: 22px; font-weight: 700; padding: 6px 0; }
  .detail-block {
    background: #FFFFFF; border: 1px solid #E5E5E8; border-radius: 10px;
    padding: 16px; margin-bottom: 20px;
  }
  .title {
    font-size: 20px; font-weight: 700; margin: 0 0 12px; cursor: text; line-height: 1.3;
  }
  .title-input {
    font-size: 20px; font-weight: 700; border: none; border-bottom: 2px solid #2563EB;
    background: transparent; width: 100%; padding: 2px 0; margin-bottom: 12px; color: #1A1A1E;
  }
  .title-input:focus { outline: none; }
  .actions-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
  }
  .complete-row {
    display: flex; align-items: center; gap: 8px; background: none; border: none;
    cursor: pointer; padding: 0; font-size: 13px; color: #5a5a60;
  }
  .checkbox {
    width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid #C7C7CC;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: #fff;
    font-size: 12px; color: #fff;
  }
  .checkbox.checked { background: #2563EB; border-color: #2563EB; }
  .delete-link { background: none; border: none; cursor: pointer; color: #DC2626; font-size: 13px; padding: 0; }
  .confirm-inline { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #5a5a60; }
  .confirm-yes { background: none; border: none; cursor: pointer; color: #DC2626; font-weight: 600; font-size: 13px; padding: 0; }
  .confirm-no { background: none; border: none; cursor: pointer; color: #5a5a60; font-size: 13px; padding: 0; }
  .notes {
    width: 100%; min-height: 64px; resize: vertical; border: 1px solid #E5E5E8; border-radius: 8px;
    background: #FAFAFB; padding: 10px 12px; font-size: 14px; line-height: 1.5; color: #1A1A1E;
    font-family: inherit;
  }
  .notes:focus { outline: none; border-color: #2563EB; }
  .section-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.02em; color: #8a8a90;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 10px;
  }
  .grid-nested {
    grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 8px;
    margin-top: 10px; padding-left: 10px; border-left: 2px solid #E5E5E8;
  }
  .tile {
    position: relative; background: #FFFFFF; border: 1px solid #E5E5E8; border-radius: 10px;
    padding: 10px 10px 12px; min-height: 92px; display: flex; flex-direction: column;
    cursor: pointer; transition: background 0.1s ease, border-color 0.1s ease;
  }
  .tile:hover { border-color: #b5b5ba; }
  .tile:active { background: #f0f0f2; }
  .tile-nested { background: #FAFAFB; min-height: 76px; padding: 8px 8px 10px; }
  .tile-expanded { grid-column: 1 / -1; min-height: 0; }
  .tile-top { display: flex; align-items: center; gap: 4px; flex: 1; }
  .chevron {
    width: 22px; height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: #8a8a90; cursor: pointer; border-radius: 6px; font-size: 13px;
  }
  .chevron:hover { background: #E2E2E6; color: #1A1A1E; }
  .chevron-spacer { width: 22px; height: 22px; flex-shrink: 0; }
  .tile-title {
    font-size: 13px; font-weight: 600; line-height: 1.3; word-break: break-word; text-align: center; flex: 1;
  }
  .tile-title.expanded { text-align: left; }
  .tile-title.done { color: #9a9aa0; text-decoration: line-through; }
  .check-badge {
    width: 16px; height: 16px; border-radius: 4px; background: #2563EB; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0; color: #fff; font-size: 10px;
  }
  .notes-toggle {
    width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    color: #8a8a90; cursor: pointer; border-radius: 6px; font-size: 12px;
  }
  .notes-toggle:hover { background: #E2E2E6; color: #1A1A1E; }
  .notes-toggle.active { color: #2563EB; }
  .notes-toggle-spacer { width: 20px; height: 20px; flex-shrink: 0; }
  .tile-notes-preview {
    margin-top: 8px; padding-top: 8px; border-top: 1px solid #EDEDF0;
    font-size: 12px; line-height: 1.4; color: #6a6a70; white-space: pre-wrap; word-break: break-word;
  }
  .tile-notes-preview.empty { color: #b5b5ba; font-style: italic; }
  .add-tile {
    background: transparent; border: 1.5px dashed #C7C7CC; border-radius: 10px; min-height: 92px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; color: #8a8a90;
  }
  .add-tile.nested { border-radius: 8px; min-height: 76px; }
  .add-tile:hover { background: #F5F5F7; }
  .plus { font-size: 20px; line-height: 1; }
  .add-label { font-size: 12px; margin-top: 4px; }
  .add-tile.nested .plus { font-size: 16px; }
  .add-tile.nested .add-label { font-size: 11px; }
  .loading { color: #8a8a90; font-size: 14px; text-align: center; margin-top: 40px; }
  .sync-status {
    position: fixed; bottom: 8px; right: 10px; font-size: 11px; color: #b5b5ba;
    background: rgba(255,255,255,0.9); padding: 3px 8px; border-radius: 6px; pointer-events: none;
  }
</style>
</head>
<body>
<div id="app"><div class="loading">Loading…</div></div>
<div id="sync-status" class="sync-status"></div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getFirestore, doc, getDoc, setDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  var firebaseConfig = {
    apiKey: "AIzaSyBtRO0GYiHr1KRYmgkYFSmF2tD2Lb9IMvU",
    authDomain: "missions-a26f9.firebaseapp.com",
    projectId: "missions-a26f9",
    storageBucket: "missions-a26f9.firebasestorage.app",
    messagingSenderId: "818478087349",
    appId: "1:818478087349:web:71cc21e54c8c6ee29e92fc"
  };

  var fbApp = initializeApp(firebaseConfig);
  var db = getFirestore(fbApp);
  var docRef = doc(db, "missions-app", "shared-data");

  function uid() {
    if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();
    return "m-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function defaultData() {
    var a = uid(), b = uid(), b1 = uid(), b2 = uid();
    var missions = {};
    missions[a] = { id: a, title: "Launch the Q3 Roadmap", notes: "Draft, review, and ship the roadmap.", completed: false, children: [] };
    missions[b] = { id: b, title: "Scout New Apartment", notes: "Tap the arrow to expand steps inside the box. Tap the note icon to preview notes without opening the page. Tap the box itself to open its own page.", completed: false, children: [b1, b2] };
    missions[b1] = { id: b1, title: "Shortlist neighborhoods", notes: "", completed: false, children: [] };
    missions[b2] = { id: b2, title: "Book viewings", notes: "", completed: false, children: [] };
    return { rootIds: [a, b], missions: missions };
  }

  var suppressNextSnapshot = false;
  var saveTimer = null;
  var statusEl = document.getElementById("sync-status");

  function setStatus(text) {
    if (statusEl) statusEl.textContent = text;
  }

  function save(d) {
    suppressNextSnapshot = true;
    setStatus("Saving…");
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      setDoc(docRef, d).then(function () {
        setStatus("Saved");
        setTimeout(function () { setStatus(""); }, 1200);
      }).catch(function (err) {
        console.error("Firestore save failed:", err);
        setStatus("Save failed — check connection");
      });
    }, 250);
  }

  var data = null;
  var path = [];
  var expandedIds = {};
  var expandedNotesIds = {};
  var editingTitle = false;
  var titleDraft = "";
  var notesDraft = "";
  var confirmDeleteSelf = false;
  var notesTimer = null;

  function currentId() { return path.length ? path[path.length - 1] : null; }
  function currentMission() { var id = currentId(); return id ? data.missions[id] : null; }
  function parentId() { return path.length > 1 ? path[path.length - 2] : null; }

  function toggleExpand(id) {
    if (expandedIds[id]) delete expandedIds[id]; else expandedIds[id] = true;
    render();
  }

  function toggleNotesExpand(id) {
    if (expandedNotesIds[id]) delete expandedNotesIds[id]; else expandedNotesIds[id] = true;
    render();
  }

  function navigateTo(ancestorPath, id) {
    path = ancestorPath.concat([id]);
    editingTitle = false;
    confirmDeleteSelf = false;
    var cm = currentMission();
    notesDraft = cm ? (cm.notes || "") : "";
    render();
  }

  function goBack() {
    path = path.slice(0, -1);
    editingTitle = false;
    confirmDeleteSelf = false;
    var cm = currentMission();
    notesDraft = cm ? (cm.notes || "") : "";
    render();
  }

  function createMission(ancestorPath, forParentId) {
    var id = uid();
    data.missions[id] = { id: id, title: "", notes: "", completed: false, children: [] };
    if (forParentId) {
      data.missions[forParentId].children.push(id);
    } else {
      data.rootIds.push(id);
    }
    save(data);
    path = ancestorPath.concat([id]);
    editingTitle = true;
    titleDraft = "";
    render();
    var input = document.querySelector(".title-input");
    if (input) { input.focus(); }
  }

  function commitTitle() {
    var cm = currentMission();
    if (!cm) return;
    var t = titleDraft.trim() || "Untitled";
    cm.title = t;
    save(data);
    editingTitle = false;
    render();
  }

  function toggleCompleteSelf() {
    var cm = currentMission();
    if (!cm) return;
    cm.completed = !cm.completed;
    save(data);
    render();
  }

  function deleteSelf() {
    var cm = currentMission();
    if (!cm) return;
    var id = cm.id;
    var toRemove = {};
    (function collect(mid) {
      toRemove[mid] = true;
      var kids = (data.missions[mid] && data.missions[mid].children) || [];
      kids.forEach(collect);
    })(id);
    Object.keys(toRemove).forEach(function (mid) { delete data.missions[mid]; });
    var pId = parentId();
    if (pId) {
      data.missions[pId].children = data.missions[pId].children.filter(function (c) { return c !== id; });
    } else {
      data.rootIds = data.rootIds.filter(function (r) { return r !== id; });
    }
    save(data);
    path = path.slice(0, -1);
    confirmDeleteSelf = false;
    var cm2 = currentMission();
    notesDraft = cm2 ? (cm2.notes || "") : "";
    render();
  }

  function onNotesInput(val) {
    notesDraft = val;
    if (notesTimer) clearTimeout(notesTimer);
    notesTimer = setTimeout(function () {
      var cm = currentMission();
      if (cm && notesDraft !== cm.notes) {
        cm.notes = notesDraft;
        save(data);
      }
    }, 400);
  }

  function el(tag, props, children) {
    props = props || {};
    children = children || [];
    var e = document.createElement(tag);
    Object.keys(props).forEach(function (k) {
      var v = props[k];
      if (k === "class") e.className = v;
      else if (k === "text") e.textContent = v;
      else if (k.indexOf("on") === 0) e.addEventListener(k.slice(2).toLowerCase(), v);
      else e.setAttribute(k, v);
    });
    children.forEach(function (c) { if (c) e.appendChild(c); });
    return e;
  }

  function buildTile(id, ancestorPath, depth) {
    var m = data.missions[id];
    if (!m) return null;
    var hasChildren = (m.children || []).length > 0;
    var isExpanded = !!expandedIds[id];
    var isNotesExpanded = !!expandedNotesIds[id];

    var tileClass = "tile" + (depth > 0 ? " tile-nested" : "") + (isExpanded ? " tile-expanded" : "");
    var tile = el("div", { class: tileClass, onclick: function () { navigateTo(ancestorPath, id); } });

    var top = el("div", { class: "tile-top" });
    var chev;
    if (hasChildren) {
      chev = el("span", {
        class: "chevron",
        text: isExpanded ? "\u25BE" : "\u25B8",
        onclick: function (e) { e.stopPropagation(); toggleExpand(id); }
      });
    } else {
      chev = el("span", { class: "chevron-spacer" });
    }
    top.appendChild(chev);

    var titleClass = "tile-title" + (isExpanded ? " expanded" : "") + (m.completed ? " done" : "");
    top.appendChild(el("span", { class: titleClass, text: m.title || "Untitled" }));

    if (m.completed) {
      top.appendChild(el("span", { class: "check-badge", text: "\u2713" }));
    }

    var notesToggle = el("span", {
      class: "notes-toggle" + (isNotesExpanded ? " active" : ""),
      text: "\uD83D\uDCDD",
      title: "Toggle notes preview",
      onclick: function (e) { e.stopPropagation(); toggleNotesExpand(id); }
    });
    top.appendChild(notesToggle);

    tile.appendChild(top);

    if (isNotesExpanded) {
      var hasNotes = m.notes && m.notes.trim().length > 0;
      var notesPreview = el("div", {
        class: "tile-notes-preview" + (hasNotes ? "" : " empty"),
        text: hasNotes ? m.notes : "No notes",
        onclick: function (e) { e.stopPropagation(); }
      });
      tile.appendChild(notesPreview);
    }

    if (isExpanded && hasChildren) {
      var wrap = el("div", { onclick: function (e) { e.stopPropagation(); } });
      wrap.appendChild(buildGrid(m.children, ancestorPath.concat([id]), id, depth + 1));
      tile.appendChild(wrap);
    }
    return tile;
  }

  function buildGrid(ids, ancestorPath, forParentId, depth) {
    var grid = el("div", { class: "grid" + (depth > 0 ? " grid-nested" : "") });
    ids.forEach(function (id) {
      var t = buildTile(id, ancestorPath, depth);
      if (t) grid.appendChild(t);
    });
    var addLabel = forParentId ? "New step" : "New mission";
    var addTile = el("button", {
      class: "add-tile" + (depth > 0 ? " nested" : ""),
      onclick: function () { createMission(ancestorPath, forParentId); }
    });
    addTile.appendChild(el("span", { class: "plus", text: "+" }));
    addTile.appendChild(el("span", { class: "add-label", text: addLabel }));
    grid.appendChild(addTile);
    return grid;
  }

  function render() {
    var app = document.getElementById("app");
    app.innerHTML = "";

    var header = el("div", { class: "header" });
    if (path.length > 0) {
      var pId = parentId();
      var backLabel = path.length > 1 && data.missions[pId] ? data.missions[pId].title || "Back" : "Missions";
      header.appendChild(el("button", {
        class: "back-btn",
        text: "\u2039 " + backLabel,
        onclick: goBack
      }));
    } else {
      header.appendChild(el("div", { class: "root-label", text: "Missions" }));
    }
    app.appendChild(header);

    var cm = currentMission();

    if (cm) {
      var block = el("div", { class: "detail-block" });

      if (editingTitle) {
        var input = el("input", { class: "title-input", type: "text", placeholder: "Name this mission" });
        input.value = titleDraft;
        input.addEventListener("input", function (e) { titleDraft = e.target.value; });
        input.addEventListener("blur", commitTitle);
        input.addEventListener("keydown", function (e) { if (e.key === "Enter") { e.target.blur(); } });
        block.appendChild(input);
      } else {
        block.appendChild(el("h1", {
          class: "title",
          text: cm.title || "Untitled",
          onclick: function () { editingTitle = true; titleDraft = cm.title; render(); var i = document.querySelector(".title-input"); if (i) { i.focus(); i.select(); } }
        }));
      }

      var actionsRow = el("div", { class: "actions-row" });
      var completeBtn = el("button", { class: "complete-row", onclick: toggleCompleteSelf });
      var checkboxSpan = el("span", { class: "checkbox" + (cm.completed ? " checked" : ""), text: cm.completed ? "\u2713" : "" });
      completeBtn.appendChild(checkboxSpan);
      completeBtn.appendChild(el("span", { text: cm.completed ? "Completed" : "Mark complete" }));
      actionsRow.appendChild(completeBtn);

      if (!confirmDeleteSelf) {
        actionsRow.appendChild(el("button", { class: "delete-link", text: "Delete", onclick: function () { confirmDeleteSelf = true; render(); } }));
      } else {
        var confirmSpan = el("span", { class: "confirm-inline" });
        confirmSpan.appendChild(el("span", { text: "Delete this mission?" }));
        confirmSpan.appendChild(el("button", { class: "confirm-yes", text: "Yes", onclick: deleteSelf }));
        confirmSpan.appendChild(el("button", { class: "confirm-no", text: "Cancel", onclick: function () { confirmDeleteSelf = false; render(); } }));
        actionsRow.appendChild(confirmSpan);
      }
      block.appendChild(actionsRow);

      var textarea = el("textarea", { class: "notes", placeholder: "Notes" });
      textarea.value = notesDraft;
      textarea.addEventListener("input", function (e) { onNotesInput(e.target.value); });
      block.appendChild(textarea);

      app.appendChild(block);
    }

    app.appendChild(el("div", { class: "section-label", text: cm ? "Steps" : "All missions" }));

    var ids = cm ? cm.children : data.rootIds;
    var forParentId = cm ? cm.id : null;
    app.appendChild(buildGrid(ids, path, forParentId, 0));
  }

  function init() {
    getDoc(docRef).then(function (snap) {
      if (snap.exists()) {
        data = snap.data();
      } else {
        data = defaultData();
        setDoc(docRef, data);
      }
      render();

      onSnapshot(docRef, function (snap) {
        if (suppressNextSnapshot) {
          suppressNextSnapshot = false;
          return;
        }
        if (snap.exists()) {
          data = snap.data();
          render();
        }
      }, function (err) {
        console.error("Firestore sync error:", err);
        setStatus("Sync error — check connection");
      });
    }).catch(function (err) {
      console.error("Firestore initial load failed:", err);
      document.getElementById("app").innerHTML =
        '<div class="loading">Could not connect. Check your internet connection and reload.</div>';
    });
  }

  init();
</script>
</body>
</html>
